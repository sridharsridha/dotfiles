##  Tmux Configuration

# Install tpm if not already installed
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm'"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'aserowy/tmux.nvim'

# navigation
set -g @tmux-nvim-navigation true
set -g @tmux-nvim-navigation-cycle true
set -g @tmux-nvim-navigation-keybinding-left 'C-h'
set -g @tmux-nvim-navigation-keybinding-down 'C-j'
set -g @tmux-nvim-navigation-keybinding-up 'C-k'
set -g @tmux-nvim-navigation-keybinding-right 'C-l'

# resize
set -g @tmux-nvim-resize true
set -g @tmux-nvim-resize-step-x 1
set -g @tmux-nvim-resize-step-y 1
set -g @tmux-nvim-resize-keybinding-left 'M-h'
set -g @tmux-nvim-resize-keybinding-down 'M-j'
set -g @tmux-nvim-resize-keybinding-up 'M-k'
set -g @tmux-nvim-resize-keybinding-right 'M-l'

set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_style "basic"
set -ogq @catppuccin_window_text " #W:#{b:pane_current_path}"
set -ogq @catppuccin_window_current_text " #W:#{b:pane_current_path}"
set -g status-left ""
set -g status-left-length 100
set -g status-right-length 100
set -g status-right "#{E:@catppuccin_status_host}"
set -ag status-right "#{E:@catppuccin_status_session}"

# Options
# Change prefix key to <space>
unbind-key C-a
unbind-key C-b
unbind-key C-Space
set-option -g prefix C-Space  # first prefix
set -g escape-time 5 # fix vim esc delay
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -as terminal-overrides ",xterm*:RGB"

# Re-number windows when one is closed
set -g renumber-windows on
set -g base-index 1
set -g mouse on
set -g default-command "${SHELL}"

setw -g pane-base-index 1
setw -g mode-keys vi
setw -g alternate-screen on
setw -g automatic-rename off

# Mappings
# Edit configuration and reload
bind C-e new-window -n 'tmux.conf' "sh -c '\${EDITOR:-vim} ~/.tmux.conf && tmux source ~/.tmux.conf && tmux display \"Config reloaded\"'"
bind c new-window      -c "#{pane_current_path}"
bind g split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind p previous-window
bind n next-window
# Copy entire scrollback buffer to a tmp file and tmux buffer
bind Y run-shell "tmux capture-pane -pS - > /tmp/tmux-buffer.txt && tmux display 'Buffer saved to /tmp/tmux-buffer.txt'"

# Initialize TMUX plugin manager
run '~/.tmux/plugins/tpm/tpm'

# Override tmux-sensible defaults
set -g history-limit 20000
set -g display-time 400
